name: Bug Report
description: Found a bug? Let us know.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `file-org "..."`
        2. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Run `file-org --version` and `python --version`
      placeholder: |
        - file-org version: 0.1.0
        - Python: 3.12
        - OS: macOS 15
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      render: shell
